const navImg = document.getElementById('nav-img'), mainImg = document.getElementById('main-img');
const navBox = document.getElementById('nav-box'), cropBox = document.getElementById('crop-box');
const mCont = document.getElementById('main-container'), nCont = document.getElementById('nav-container');
const fileInput = document.getElementById('file-input');

let img={w:0,h:0,isLoaded:false}, view={x:0,y:0,scale:1}, sel={x:0,y:0,w:0,h:0};
let touch={mode:'',lastX:0,lastY:0,edge:''};

fileInput.onchange = e=>{
 const f=e.target.files[0]; if(!f)return;
 const r=new FileReader();
 r.onload=ev=>{
  navImg.src=mainImg.src=ev.target.result;
  mainImg.onload=()=>{
   img.w=mainImg.naturalWidth; img.h=mainImg.naturalHeight; img.isLoaded=true;
   sel={x:0,y:0,w:img.w,h:img.h};
   mainImg.style.display=navImg.style.display=cropBox.style.display=navBox.style.display='block';
   update();
  };
 };
 r.readAsDataURL(f);
};

mCont.addEventListener('touchstart',e=>{
 if(!img.isLoaded)return;
 const t=e.touches[0];
 touch.mode = e.target.classList.contains('handle') ? 'edit' : 'scroll';
 if(touch.mode==='edit') touch.edge=e.target.dataset.edge;
 touch.lastX=t.pageX; touch.lastY=t.pageY;
},{passive:false});

mCont.addEventListener('touchmove',e=>{
 if(!touch.mode)return; e.preventDefault();
 const t=e.touches[0];
 // 表示倍率で割ることで、拡大時も指の動きと枠の縁を一致させる
 let dx=(t.pageX-touch.lastX)/view.scale;
 let dy=(t.pageY-touch.lastY)/view.scale;

 if(touch.mode==='scroll'){
  // スクロール時はview.x/yを直接動かす（オートズーム後に微調整したい場合用）
  view.x+=t.pageX-touch.lastX; view.y+=t.pageY-touch.lastY;
 }
 if(touch.mode==='edit'){
  const min=1;
  if(touch.edge==='n'){ dy=Math.min(dy,sel.h-min); sel.y+=dy; sel.h-=dy; }
  if(touch.edge==='s'){ sel.h=Math.max(min,sel.h+dy); }
  if(touch.edge==='e'){ sel.w=Math.max(min,sel.w+dx); }
  if(touch.edge==='w'){ dx=Math.min(dx,sel.w-min); sel.x+=dx; sel.w-=dx; }
  
  // ビットマップ範囲内に制限
  sel.x=Math.max(0,Math.min(sel.x,img.w-sel.w));
  sel.y=Math.max(0,Math.min(sel.y,img.h-sel.h));
  sel.w=Math.max(min,Math.min(sel.w,img.w-sel.x));
  sel.h=Math.max(min,Math.min(sel.h,img.h-sel.y));
 }
 touch.lastX=t.pageX; touch.lastY=t.pageY;
 update();
},{passive:false});

mCont.addEventListener('touchend',()=>{
 if(touch.mode==='edit'){
  sel.x=Math.round(sel.x); sel.y=Math.round(sel.y);
  sel.w=Math.round(sel.w); sel.h=Math.round(sel.h);
 }
 touch.mode='';
 update();
});

function update() {
  if (!img.isLoaded) return;
  const mr = mCont.getBoundingClientRect();
  
  // 1. 【オートズーム】絞り込みに合わせて拡大。最大40px(1cm)/pixel
  const maxPixelSize = 40; 
  // 画面の80%程度に収まるスケールを計算
  let s = Math.min(mr.width * 0.8 / sel.w, mr.height * 0.8 / sel.h);
  // 全体表示を下限、40pxを上限とする
  const minS = Math.min(mr.width / img.w, mr.height / img.h);
  view.scale = Math.max(minS, Math.min(s, maxPixelSize));

  // 2. 【自動センター】選択範囲の中心を画面中央へ
  // スクロールモード中以外は常に中央に固定する
  if(touch.mode !== 'scroll'){
    view.x = (mr.width / 2) - (sel.x + sel.w / 2) * view.scale;
    view.y = (mr.height / 2) - (sel.y + sel.h / 2) * view.scale;
  }

  mainImg.style.transform = `translate(${view.x}px,${view.y}px) scale(${view.scale})`;

  const L = view.x + sel.x * view.scale, T = view.y + sel.y * view.scale;
  const W = sel.w * view.scale, H = sel.h * view.scale;
  cropBox.style.left = L+'px'; cropBox.style.top = T+'px';
  cropBox.style.width = W+'px'; cropBox.style.height = H+'px';

  // 3. ハンドル配置（動的Pad制御）
  const pad = 50; 
  const dPW = Math.min(pad, W), dPH = Math.min(pad, H);
  const isHL = sel.w > sel.h;

  ['n', 's', 'e', 'w'].forEach(edge => {
    const o = document.getElementById(`h${edge}_o`), i = document.getElementById(`h${edge}_i`);
    if (edge === 'n' || edge === 's') {
      const b = (edge === 'n') ? T : T + H;
      o.style.width = Math.max(0, W - pad*2) + 'px';
      o.style.left = (L + pad) + 'px';
      o.style.top = (edge === 'n' ? b - pad : b) + 'px';
      o.style.height = pad + 'px';
      i.style.width = W + 'px'; i.style.left = L + 'px';
      i.style.top = (edge === 'n' ? b : b - dPH) + 'px';
      i.style.height = dPH + 'px';
    } else {
      const b = (edge === 'w') ? L : L + W;
      o.style.height = Math.max(0, H - pad*2) + 'px';
      o.style.top = (T + pad) + 'px';
      o.style.left = (edge === 'w' ? b - pad : b) + 'px';
      o.style.width = pad + 'px';
      i.style.height = H + 'px'; i.style.top = T + 'px';
      i.style.left = (edge === 'w' ? b : b - dPW) + 'px';
      i.style.width = dPW + 'px';
    }
    o.style.zIndex = 20;
    i.style.zIndex = isHL ? ((edge === 'e' || edge === 'w') ? 10 : 5) : ((edge === 'n' || edge === 's') ? 10 : 5);
  });

  // 4. ナビキャンバス更新
  const nr = nCont.getBoundingClientRect();
  const ns = Math.min(nr.width / img.w, nr.height / img.h);
  const nx = (nr.width - img.w * ns) / 2, ny = (nr.height - img.h * ns) / 2;
  navImg.style.transform = `translate(${nx}px,${ny}px) scale(${ns})`;
  navBox.style.left = (nx + sel.x * ns) + 'px'; navBox.style.top = (ny + sel.y * ns) + 'px';
  navBox.style.width = (sel.w * ns) + 'px'; navBox.style.height = (sel.h * ns) + 'px';

  let vBox = document.getElementById('view-box');
  if (!vBox) {
    vBox = document.createElement('div'); vBox.id = 'view-box';
    vBox.style.cssText = 'position:absolute;pointer-events:none;box-shadow:0 0 0 4000px rgba(77,163,255,0.3);';
    nCont.appendChild(vBox);
  }
  const vL = -view.x/view.scale, vT = -view.y/view.scale, vW = mr.width/view.scale, vH = mr.height/view.scale;
  vBox.style.left = (nx + vL * ns) + 'px'; vBox.style.top = (ny + vT * ns) + 'px';
  vBox.style.width = (vW * ns) + 'px'; vBox.style.height = (vH * ns) + 'px';
}



 
</script>
